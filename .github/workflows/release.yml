name: Daily Build

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest    # Apple Silicon (arm64)
            arch: arm64
            release_os: macos
          - os: macos-15-intel  # Intel (x64)
            arch: x64
            release_os: macos
          - os: windows-latest
            arch: x64
            release_os: windows
          # Linux - uncomment when ready:
          # - os: ubuntu-latest
          #   arch: x64
          #   release_os: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enforce branch constraint
        shell: bash
        run: |
          # Extract channel from tag (e.g. "daily" from v2.1.0-daily.20260409.1)
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-([a-z]+)\. ]]; then
            CHANNEL="${BASH_REMATCH[1]}"
          else
            CHANNEL="daily"
          fi

          # Dev channel: any branch is allowed
          if [[ "$CHANNEL" == "dev" ]]; then
            echo "Dev channel tag — branch constraint skipped."
            exit 0
          fi

          # Daily/Stable channel: tagged commit must be on master
          if git merge-base --is-ancestor "${{ github.sha }}" origin/master; then
            echo "Tag commit is on master — OK."
          else
            echo "::error::Daily channel tags must be created from the master branch."
            echo "This tag ($TAG) points to a commit not on master."
            echo "Use a dev channel tag (e.g. v2.1.0-dev.20260409.1) for non-master branches."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store-path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.store-path }}
          key: ${{ runner.os }}-${{ matrix.arch }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-pnpm-

      - name: Cache Electron and electron-builder
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
            ~/AppData/Local/electron/Cache
            ~/AppData/Local/electron-builder/Cache
          key: ${{ runner.os }}-${{ matrix.arch }}-electron-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-electron-

      - name: Install dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Extract tag name
        id: tag
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build release
        env:
          ONWARD_TAG: ${{ steps.tag.outputs.version }}
          ONWARD_RELEASE_OS: ${{ matrix.release_os }}
          NODE_OPTIONS: '--max-old-space-size=4096'
        shell: bash
        run: rm -rf out release && pnpm dist:release

      - name: Smoke-launch packaged app
        if: runner.os == 'macOS' || runner.os == 'Windows'
        shell: bash
        env:
          ONWARD_SMOKE_LAUNCH: '1'
        run: |
          set -euo pipefail
          READY_FILE="$RUNNER_TEMP/onward-smoke-ready.json"
          LOG_FILE="$RUNNER_TEMP/onward-smoke.log"
          rm -f "$READY_FILE" "$LOG_FILE"
          export ONWARD_SMOKE_READY_FILE="$READY_FILE"
          export ONWARD_DIST_DEV_OPEN=0

          # Locate the unpacked app (produced alongside the dmg/zip/exe).
          case "${{ runner.os }}" in
            macOS)
              APP=$(find release -maxdepth 4 -type d -name '*.app' 2>/dev/null | head -1)
              if [ -z "$APP" ]; then echo "::warning::No .app found; skipping smoke launch." ; exit 0 ; fi
              APP_NAME=$(basename "$APP" .app)
              BIN="$APP/Contents/MacOS/$APP_NAME"
              echo "Launching $BIN"
              "$BIN" > "$LOG_FILE" 2>&1 &
              APP_PID=$!
              ;;
            Windows)
              EXE=$(find release -maxdepth 4 -type f -name '*.exe' -path '*unpacked*' 2>/dev/null | head -1)
              if [ -z "$EXE" ]; then echo "::warning::No unpacked .exe found; skipping smoke launch." ; exit 0 ; fi
              echo "Launching $EXE"
              "$EXE" > "$LOG_FILE" 2>&1 &
              APP_PID=$!
              ;;
          esac

          # Poll up to 60 s for the ready marker.
          for i in $(seq 1 60); do
            if [ -f "$READY_FILE" ]; then
              echo "App reported ready after ${i}s"
              cat "$READY_FILE" || true
              # App exits itself; wait briefly then force-kill if still alive.
              wait "$APP_PID" 2>/dev/null || true
              kill -9 "$APP_PID" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done

          echo "::error::App did not report ready within 60s (ONWARD_SMOKE_LAUNCH=1)"
          echo "--- app log ---"
          cat "$LOG_FILE" 2>/dev/null || true
          kill -9 "$APP_PID" 2>/dev/null || true
          exit 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ runner.os }}-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Generate update manifests
        env:
          ONWARD_GITHUB_REPOSITORY: ${{ github.repository }}
          ONWARD_RELEASE_TAG: ${{ github.ref_name }}
          ONWARD_ARTIFACT_DIR: dist-artifacts
          ONWARD_MANIFEST_DIR: update-manifests
          ONWARD_CHANGELOG_ROOT: resources/changelog
        run: node scripts/generate-update-manifest.js

      - name: Upload artifacts to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          # Extract channel from tag (e.g. "daily" from v2.1.0-daily.20260409.1)
          if [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(([a-z]+)\.[0-9]{8}\.[0-9]+)$ ]]; then
            CHANNEL="${BASH_REMATCH[2]}"
          else
            CHANNEL="daily"
          fi
          # Capitalize first letter for display label
          CHANNEL_LABEL="$(echo "$CHANNEL" | sed 's/./\U&/') Build"
          # Search for changelog: try channel-specific dir first, then daily/ as fallback
          NOTES_FILE=""
          for dir in "$CHANNEL" daily; do
            candidate="resources/changelog/en/${dir}/${RELEASE_TAG}.md"
            if [[ -f "$candidate" ]]; then
              NOTES_FILE="$candidate"
              break
            fi
          done
          if [[ -z "$NOTES_FILE" ]]; then
            echo "Missing Change Log file for ${RELEASE_TAG} (searched: ${CHANNEL}/, daily/)" >&2
            exit 1
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$CHANNEL_LABEL $RELEASE_TAG" \
              --notes-file "$NOTES_FILE" \
              --draft=false \
              --prerelease
          else
            gh release create "$RELEASE_TAG" \
              --title "$CHANNEL_LABEL $RELEASE_TAG" \
              --notes-file "$NOTES_FILE" \
              --prerelease
          fi
          # Upload all platform artifacts (dmg, zip, exe)
          for ext in dmg zip exe; do
            if compgen -G "dist-artifacts/*.$ext" > /dev/null; then
              gh release upload "$RELEASE_TAG" dist-artifacts/*.$ext --clobber
            fi
          done

      - name: Publish update manifests to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add gh-pages-worktree origin/gh-pages
          else
            git worktree add --detach gh-pages-worktree
            (
              cd gh-pages-worktree
              git checkout --orphan gh-pages
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi
          mkdir -p gh-pages-worktree/updates
          rsync -a update-manifests/ gh-pages-worktree/updates/
          touch gh-pages-worktree/.nojekyll
          (
            cd gh-pages-worktree
            git add updates .nojekyll
            git commit -m "Update manifests for ${RELEASE_TAG}" || true
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
          )
